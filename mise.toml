[tools]
# Infrastructure linters (enabled by default)
hadolint = "2.14.0"          # Dockerfiles
shellcheck = "0.11.0"        # Shell scripts (bin/*, *.sh)
actionlint = "1.7.12"        # GitHub Actions workflows
"pipx:yamllint" = "1.38.0"   # YAML files

# Language-specific linters (opt-in via linters input)
ruff = "0.15.11"                                        # Python lint + format
golangci-lint = "2.11.4"                               # Go
"pipx:pyright" = "1.1.409"                             # Python type checking
"pipx:blinter" = "1.0.112"                             # Windows batch files
"go:golang.org/x/vuln/cmd/govulncheck" = "1.1.4"      # Go vulnerability scanning
tflint = "0.62.0"                                      # Terraform/HCL linting
opentofu = "1.11.6"                                    # Terraform formatting (tofu fmt)
